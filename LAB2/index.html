<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GPA Calculator</title>
<link href="style.css" rel="stylesheet"> 
<script src="script.js"></script> 
</head>
<body>

<div class="corner-marker cm-tl"></div>
<div class="corner-marker cm-tr"></div>
<div class="corner-marker cm-bl"></div>
<div class="corner-marker cm-br"></div>

<h1>GPA Calculator</h1>
<form action="calculate.php" method="post" onsubmit="return validateForm();">
  <div class="btn-row" id="courses">
    <div class="course-row">
      <label>Course:</label>
      <input type="text" name="course[]" placeholder="e.g. Mathematics" required>
      <label>Credits:</label>
      <input type="number" name="credits[]" placeholder="e.g. 3" min="1" required>
      <label>Grade:</label>
      <select name="grade[]" required>
        <option value=""> Select a grade </option>
        <option value="4.0">A</option>
        <option value="3.0">B</option>
        <option value="2.0">C</option>
        <option value="1.0">D</option>
        <option value="0.0">F</option>
      </select>
    </div>
  </div>

  <div class="btn-row">
    <button class="button" type="button" onclick="addCourse()">+ Add Course</button>
    <input class="button" type="submit" value="Calculate GPA">
  </div>
</form>
</body>
</html>
